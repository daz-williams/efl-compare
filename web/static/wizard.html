<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Find your cheaper electricity plan</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#141c2b; --mid:#5a6478; --line:#e4e9f2;
    --brand:#1f6feb; --brand-ink:#ffffff; --good:#12855a; --good-bg:#e6f6ee;
    --warn:#b25e00; --warn-bg:#fdf1e1; --shadow:0 6px 24px rgba(20,28,43,.08);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1420; --card:#171f2e; --ink:#eef2f9; --mid:#9aa6bd; --line:#26303f;
      --brand:#4d90f0; --good:#3ecf8e; --good-bg:#12261e; --warn:#e0932f; --warn-bg:#2a2013;
      --shadow:0 6px 24px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px; margin:0 auto; padding:24px 18px 64px}
  header.top{display:flex; align-items:center; gap:10px; padding:8px 2px 20px}
  .spark{font-size:1.5rem}
  .top h1{font-size:1.05rem; margin:0; font-weight:700}
  .top .sub{color:var(--mid); font-size:.8rem; margin-top:2px}
  .dots{display:flex; gap:8px; justify-content:center; margin:6px 0 22px}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--line)}
  .dot.on{background:var(--brand)}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    box-shadow:var(--shadow); padding:26px;
  }
  h2.q{font-size:1.5rem; margin:.1em 0 .1em; font-weight:800; letter-spacing:-.01em}
  p.lead{color:var(--mid); margin:.2em 0 1.4em; font-size:1rem}
  .choices{display:grid; gap:12px}
  .choice{
    display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    background:var(--card); border:1.5px solid var(--line); border-radius:14px;
    padding:16px 18px; cursor:pointer; font:inherit; color:inherit; transition:.15s;
  }
  .choice:hover{border-color:var(--brand); transform:translateY(-1px)}
  .choice .emoji{font-size:1.7rem; width:38px; text-align:center}
  .choice .t{font-weight:700; font-size:1.05rem}
  .choice .d{color:var(--mid); font-size:.85rem}
  .choice .from{margin-left:auto; text-align:right; white-space:nowrap}
  .choice .from b{font-size:1.15rem}
  .choice .from span{display:block; color:var(--mid); font-size:.72rem}
  button.big{
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    background:var(--brand); color:var(--brand-ink); border:0; border-radius:14px;
    padding:16px 26px; font:inherit; font-weight:700; font-size:1.05rem; cursor:pointer;
    width:100%; transition:.15s;
  }
  button.big:hover{filter:brightness(1.06)}
  .link{background:none; border:0; color:var(--brand); font:inherit; cursor:pointer; padding:8px; font-weight:600}
  .curbanner{
    background:var(--warn-bg); border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; margin-bottom:18px; font-size:.92rem;
  }
  .curbanner b{color:var(--ink)}
  .rank{display:flex; flex-direction:column; gap:14px}
  .plan{
    background:var(--card); border:1.5px solid var(--line); border-radius:16px; padding:20px;
    position:relative;
  }
  .plan.best{border-color:var(--good)}
  .badge{
    position:absolute; top:-11px; left:18px; background:var(--good); color:#fff;
    font-size:.72rem; font-weight:800; letter-spacing:.03em; padding:3px 11px; border-radius:20px;
    text-transform:uppercase;
  }
  .plan.n2 .badge, .plan.n3 .badge{background:var(--mid)}
  .plan .prov{color:var(--mid); font-size:.82rem; font-weight:600}
  .plan .prov .owner{font-weight:500; opacity:.75; text-transform:none}
  .plan .prov .owner::before{content:"·"; margin:0 6px}
  /* Contract-length picker */
  .termpick{margin:0 0 16px}
  .termlab{display:block; color:var(--mid); font-size:.85rem; margin-bottom:8px}
  .chips{display:flex; gap:8px; flex-wrap:wrap}
  .chip{display:flex; flex-direction:column; align-items:flex-start; gap:1px;
    background:var(--card); color:var(--ink); border:1px solid var(--line);
    border-radius:11px; padding:7px 13px; font:inherit; font-size:.86rem;
    font-weight:700; cursor:pointer; text-align:left}
  .chip .chipsub{font-weight:400; font-size:.74rem; color:var(--mid)}
  .chip:hover:not(:disabled){border-color:var(--brand)}
  .chip.on{border-color:var(--brand); background:var(--brand); color:#fff}
  .chip.on .chipsub{color:#fff; opacity:.85}
  .chip:disabled{opacity:.4; cursor:not-allowed}
  /* Same-parent-company disclosure */
  .famwarn{background:var(--warn-bg); border:1px solid var(--line);
    border-radius:12px; padding:12px 15px; margin-bottom:14px; font-size:.9rem; line-height:1.5}
  .famwarn .famnote{display:block; color:var(--mid); font-size:.83rem; margin-top:5px}
  .famwarn .famsrc{display:inline-block; margin-top:5px; font-size:.78rem; color:var(--mid)}
  .plan .name{font-weight:800; font-size:1.15rem; margin:1px 0 8px; letter-spacing:-.01em}
  .price{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
  .price .amt{font-size:2.1rem; font-weight:800; letter-spacing:-.02em}
  .price .per{color:var(--mid); font-size:.9rem}
  /* The all-in rate, directly comparable to the ¢/kWh in the bill banner. */
  .price .rate{color:var(--ink); font-size:.9rem; font-weight:700;
    background:var(--bg); border:1px solid var(--line); border-radius:7px; padding:2px 8px}
  .save{display:inline-block; background:var(--good-bg); color:var(--good); font-weight:700;
    font-size:.9rem; padding:4px 11px; border-radius:8px; margin-top:8px}
  .tot{color:var(--mid); font-size:.85rem; margin-top:7px}
  .meta{display:flex; gap:16px; flex-wrap:wrap; color:var(--mid); font-size:.85rem; margin-top:12px}
  .meta .leaf{color:var(--good); font-weight:700}
  .be{margin-top:12px; padding:11px 14px; background:var(--bg); border-radius:10px;
    font-size:.88rem; border:1px solid var(--line)}
  .plan .act{margin-top:16px}
  .plan .act a{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--brand); color:var(--brand-ink); text-decoration:none; font-weight:700;
    border-radius:11px; padding:12px 18px; width:100%;
  }
  .foot{text-align:center; color:var(--mid); font-size:.78rem; margin-top:26px; line-height:1.6}
  .foot a{color:var(--mid)}
  .navrow{display:flex; justify-content:space-between; align-items:center; margin-top:18px}
  .field{margin:0 0 18px}
  .field label{display:block; font-weight:700; margin-bottom:7px; font-size:1rem}
  .field .hint{color:var(--mid); font-weight:400; font-size:.82rem}
  .inrow{display:flex; align-items:center; gap:10px}
  .inrow input{
    flex:1; min-width:0; font:inherit; font-size:1.05rem; padding:13px 15px;
    border:1.5px solid var(--line); border-radius:12px; background:var(--card); color:var(--ink);
  }
  .inrow input:focus{outline:none; border-color:var(--brand)}
  .inrow .unit{color:var(--mid); font-weight:600; white-space:nowrap}
  .err{color:var(--warn); font-size:.88rem; margin:2px 0 12px; min-height:1.1em}
  .optional{border-top:1px solid var(--line); margin:22px 0 18px; padding-top:18px}
  .optional .why{color:var(--mid); font-size:.85rem; margin:0 0 16px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <span class="spark">&#9889;</span>
    <div>
      <h1>Find your cheaper electricity plan</h1>
      <div class="sub" id="subline"></div>
    </div>
  </header>
  <div class="dots"><span class="dot on" id="d0"></span><span class="dot" id="d1"></span><span class="dot" id="d2"></span></div>
  <div id="app"></div>
  <div class="foot" id="foot"></div>
</div>
<script src="/static/wizard.js"></script>
</body>
</html>
